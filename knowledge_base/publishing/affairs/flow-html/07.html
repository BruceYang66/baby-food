<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>07</title><style>body{margin:0;background:#f4f7fb;font-family:'Microsoft YaHei',sans-serif}.card{width:1080px;height:1920px;margin:0 auto;background:linear-gradient(180deg,#fff,#fefce8);padding:72px;box-sizing:border-box}.tag{display:inline-block;background:#ca8a04;color:#fff;padding:10px 18px;border-radius:999px;font-size:28px}.title{font-size:54px;line-height:1.2;font-weight:700;color:#0f172a;margin:30px 0}.step{background:#fff;border-radius:22px;padding:24px 26px;margin:18px 0;box-shadow:0 10px 30px rgba(120,90,0,.08)}.n{font-size:28px;font-weight:700;color:#ca8a04}.txt{font-size:32px;color:#1e293b;margin-top:8px}.tips{margin-top:20px;background:#fef9c3;border-radius:18px;padding:18px 22px;font-size:28px;color:#854d0e}</style></head><body><div class="card"><div class="tag">广州生育津贴</div><div class="title">申领条件与到账时间</div><div class="step"><div class="n">STEP 1</div><div class="txt">确认参保状态与申领资格（单位/个人路径）</div></div><div class="step"><div class="n">STEP 2</div><div class="txt">准备生育相关材料与收款账户信息</div></div><div class="step"><div class="n">STEP 3</div><div class="txt">线上/线下提交，跟进审核进度</div></div><div class="step"><div class="n">STEP 4</div><div class="txt">审核通过后通常10-30个工作日到账</div></div><div class="tips">提醒：参保连续性与账户异常是常见延迟原因。</div></div></body></html>
