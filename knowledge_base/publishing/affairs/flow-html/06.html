<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>06</title><style>body{margin:0;background:#f4f7fb;font-family:'Microsoft YaHei',sans-serif}.card{width:1080px;height:1920px;margin:0 auto;background:linear-gradient(180deg,#fff,#faf5ff);padding:72px;box-sizing:border-box}.tag{display:inline-block;background:#9333ea;color:#fff;padding:10px 18px;border-radius:999px;font-size:28px}.title{font-size:54px;line-height:1.2;font-weight:700;color:#0f172a;margin:30px 0}.step{background:#fff;border-radius:22px;padding:24px 26px;margin:18px 0;box-shadow:0 10px 30px rgba(80,20,130,.08)}.n{font-size:28px;font-weight:700;color:#9333ea}.txt{font-size:32px;color:#1e293b;margin-top:8px}.tips{margin-top:20px;background:#f3e8ff;border-radius:18px;padding:18px 22px;font-size:28px;color:#6b21a8}</style></head><body><div class="card"><div class="tag">未成年人身份证</div><div class="title">宝宝身份证办理流程</div><div class="step"><div class="n">STEP 1</div><div class="txt">线上预约受理点（无最低年龄限制）</div></div><div class="step"><div class="n">STEP 2</div><div class="txt">监护人陪同到场，提交材料核验</div></div><div class="step"><div class="n">STEP 3</div><div class="txt">现场采集人像与身份信息</div></div><div class="step"><div class="n">STEP 4</div><div class="txt">制证完成后领取/邮寄，后续按有效期换领</div></div><div class="tips">提醒：未满16周岁身份证通常5年有效，建议提前设换证提醒。</div></div></body></html>
