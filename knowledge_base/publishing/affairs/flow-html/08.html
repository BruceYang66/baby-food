<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>08</title><style>body{margin:0;background:#f4f7fb;font-family:'Microsoft YaHei',sans-serif}.card{width:1080px;height:1920px;margin:0 auto;background:linear-gradient(180deg,#fff,#eef2ff);padding:72px;box-sizing:border-box}.tag{display:inline-block;background:#4f46e5;color:#fff;padding:10px 18px;border-radius:999px;font-size:28px}.title{font-size:54px;line-height:1.2;font-weight:700;color:#0f172a;margin:30px 0}.step{background:#fff;border-radius:22px;padding:24px 26px;margin:18px 0;box-shadow:0 10px 30px rgba(40,40,120,.08)}.n{font-size:28px;font-weight:700;color:#4f46e5}.txt{font-size:32px;color:#1e293b;margin-top:8px}.tips{margin-top:20px;background:#e0e7ff;border-radius:18px;padding:18px 22px;font-size:28px;color:#3730a3}</style></head><body><div class="card"><div class="tag">异地户口在广州</div><div class="title">居住证用于宝宝医保衔接</div><div class="step"><div class="n">STEP 1</div><div class="txt">先做居住登记，确认登记时间起点</div></div><div class="step"><div class="n">STEP 2</div><div class="txt">满足条件后申请居住证（就业/住所/就读证明）</div></div><div class="step"><div class="n">STEP 3</div><div class="txt">再核定宝宝医保参保路径与缴费规则</div></div><div class="step"><div class="n">STEP 4</div><div class="txt">按区级窗口口径补齐差异材料</div></div><div class="tips">提醒：居住证≠自动享受全部医保待遇，务必先核定资格。</div></div></body></html>
