<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>02</title><style>body{margin:0;background:#f4f7fb;font-family:'Microsoft YaHei',sans-serif}.card{width:1080px;height:1920px;margin:0 auto;background:linear-gradient(180deg,#fff,#fff7ed);padding:72px;box-sizing:border-box}.tag{display:inline-block;background:#ea580c;color:#fff;padding:10px 18px;border-radius:999px;font-size:28px}.title{font-size:54px;line-height:1.2;font-weight:700;color:#0f172a;margin:30px 0}.step{background:#fff;border-radius:22px;padding:24px 26px;margin:18px 0;box-shadow:0 10px 30px rgba(120,60,0,.08)}.n{font-size:28px;font-weight:700;color:#ea580c}.txt{font-size:32px;color:#1e293b;margin-top:8px}.tips{margin-top:20px;background:#fff7ed;border:1px solid #fed7aa;border-radius:18px;padding:18px 22px;font-size:28px;color:#9a3412}</style></head><body><div class="card"><div class="tag">医院+线上联办</div><div class="title">出生证明办理攻略</div><div class="step"><div class="n">STEP 1</div><div class="txt">准备父母证件信息 + 新生儿姓名确认</div></div><div class="step"><div class="n">STEP 2</div><div class="txt">医院窗口核验：分娩信息、身份信息、签字确认</div></div><div class="step"><div class="n">STEP 3</div><div class="txt">可先线上预约“出生一件事”，再按通知到院办理/联办</div></div><div class="step"><div class="n">STEP 4</div><div class="txt">领证后立刻用于上户口与医保流程</div></div><div class="tips">关键：姓名与出生信息务必逐项核对，改名/更正成本高。</div></div></body></html>
