<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>03</title><style>body{margin:0;background:#f4f7fb;font-family:'Microsoft YaHei',sans-serif}.card{width:1080px;height:1920px;margin:0 auto;background:linear-gradient(180deg,#fff,#f0fdf4);padding:72px;box-sizing:border-box}.tag{display:inline-block;background:#16a34a;color:#fff;padding:10px 18px;border-radius:999px;font-size:28px}.title{font-size:54px;line-height:1.2;font-weight:700;color:#0f172a;margin:30px 0}.step{background:#fff;border-radius:22px;padding:24px 26px;margin:18px 0;box-shadow:0 10px 30px rgba(0,90,40,.08)}.n{font-size:28px;font-weight:700;color:#16a34a}.txt{font-size:32px;color:#1e293b;margin-top:8px}.tips{margin-top:20px;background:#ecfdf5;border-radius:18px;padding:18px 22px;font-size:28px;color:#166534}</style></head><body><div class="card"><div class="tag">新生儿落户</div><div class="title">上户口全流程</div><div class="step"><div class="n">STEP 1</div><div class="txt">先取得出生医学证明</div></div><div class="step"><div class="n">STEP 2</div><div class="txt">线上预约户政受理时段</div></div><div class="step"><div class="n">STEP 3</div><div class="txt">按清单携带原件到场核验与录入</div></div><div class="step"><div class="n">STEP 4</div><div class="txt">办结后更新户口簿，进入医保办理</div></div><div class="tips">提醒：先确认是否要求父母双方到场，避免改期。</div></div></body></html>
