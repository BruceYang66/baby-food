<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>05</title><style>body{margin:0;background:#f4f7fb;font-family:'Microsoft YaHei',sans-serif}.card{width:1080px;height:1920px;margin:0 auto;background:linear-gradient(180deg,#fff,#fdf2f8);padding:72px;box-sizing:border-box}.tag{display:inline-block;background:#db2777;color:#fff;padding:10px 18px;border-radius:999px;font-size:28px}.title{font-size:54px;line-height:1.2;font-weight:700;color:#0f172a;margin:30px 0}.step{background:#fff;border-radius:22px;padding:24px 26px;margin:18px 0;box-shadow:0 10px 30px rgba(140,20,80,.08)}.n{font-size:28px;font-weight:700;color:#db2777}.txt{font-size:32px;color:#1e293b;margin-top:8px}.tips{margin-top:20px;background:#fdf2f8;border-radius:18px;padding:18px 22px;font-size:28px;color:#9d174d}</style></head><body><div class="card"><div class="tag">接种证补办</div><div class="title">疫苗接种本丢了怎么办</div><div class="step"><div class="n">STEP 1</div><div class="txt">联系原接种门诊（优先）或现居住地门诊</div></div><div class="step"><div class="n">STEP 2</div><div class="txt">提交监护人+儿童身份信息申请补证</div></div><div class="step"><div class="n">STEP 3</div><div class="txt">门诊核验系统档案并补录历史记录</div></div><div class="step"><div class="n">STEP 4</div><div class="txt">跨区家庭先转入建档，再继续本地预约接种</div></div><div class="tips">提醒：先补证再补录，不要盲目重打疫苗。</div></div></body></html>
