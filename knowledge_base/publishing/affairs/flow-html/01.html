<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>01</title><style>body{margin:0;background:#f4f7fb;font-family:'Microsoft YaHei',sans-serif}.card{width:1080px;height:1920px;margin:0 auto;background:linear-gradient(180deg,#fff,#eef5ff);padding:72px;box-sizing:border-box}.tag{display:inline-block;background:#005daa;color:#fff;padding:10px 18px;border-radius:999px;font-size:28px}.title{font-size:56px;line-height:1.2;font-weight:700;color:#0f172a;margin:30px 0}.sub{font-size:30px;color:#475569;margin-bottom:26px}.step{background:#fff;border-radius:22px;padding:24px 26px;margin:18px 0;box-shadow:0 10px 30px rgba(0,60,120,.08)}.n{font-size:28px;font-weight:700;color:#005daa}.txt{font-size:32px;color:#1e293b;margin-top:8px}.tips{margin-top:20px;background:#ecfeff;border-radius:18px;padding:18px 22px;font-size:28px;color:#0f766e}</style></head><body><div class="card"><div class="tag">广州办证流程图</div><div class="title">宝宝出生后要办哪些证</div><div class="sub">按时间轴走，少跑腿、不漏办</div><div class="step"><div class="n">STEP 1（出生后尽快）</div><div class="txt">出生医学证明 + 预防接种建档</div></div><div class="step"><div class="n">STEP 2（1个月内）</div><div class="txt">新生儿落户（先预约再到场核验）</div></div><div class="step"><div class="n">STEP 3（3个月内）</div><div class="txt">居民医保参保缴费 + 社保卡/医保电子凭证</div></div><div class="step"><div class="n">STEP 4（按需）</div><div class="txt">宝宝身份证 / 异地家庭居住证衔接</div></div><div class="tips">提醒：各区材料细项略有差异，出发前先电话确认受理窗口。</div></div></body></html>
